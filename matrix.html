<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style2.css">
    <title>Mionea Express Fare Matrix</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <img src="ihatemylife.png" alt="Limbus Company" style="height: 40px;">
            <a href="index.html">Home</a>
            <a href="matrix.html">Fare Matrix</a>
            <a href="https://pia.gov.ph/news/mrt-3-extends-operating-hours/" target="_blank">Schedule</a>
            <input type="text" class="search" placeholder="Search...">
            <button class="search-btn" style="color: rgb(190, 140, 240); font-weight: bold;" onclick="location.reload()">Search</button>
            <a href="https://www.sakay.ph/" target="_blank" class="right">Book Now</a>
            <a href="registration.html" class="create-btn">Create my account</a>
        </nav>
    </header><br>
    <div class="fare-container">
    <form>
    <label for="plocations">Pickup Location</label>
    <select name="plocations" id="plocations">
        <option value="North Avenue">North Avenue</option>
        <option value="Quezon Avenue">Quezon Avenue</option>
        <option value="Kamuning">Kamuning</option>
        <option value="Araneta Center-Cubao">Araneta Center-Cubao</option>
        <option value="Santolan-Annapolis">Santolan-Annapolis</option>
        <option value="Ortigas">Ortigas</option>
        <option value="Shaw Boulevard">Shaw Boulevard</option>
        <option value="Boni">Boni</option>
        <option value="Guadalupe">Guadalupe</option>
        <option value="Buendia">Buendia</option>
        <option value="Ayala">Ayala</option>
        <option value="Magallanes">Magallanes</option>
        <option value="Taft Avenue">Taft Avenue</option>
    </select>
    <label for="dlocations">Drop Off Location</label>
    <select name="dlocations" id="dlocations">
        <option value="North Avenue">North Avenue</option>
        <option value="Quezon Avenue">Quezon Avenue</option>
        <option value="Kamuning">Kamuning</option>
        <option value="Araneta Center-Cubao">Araneta Center-Cubao</option>
        <option value="Santolan-Annapolis">Santolan-Annapolis</option>
        <option value="Ortigas">Ortigas</option>
        <option value="Shaw Boulevard">Shaw Boulevard</option>
        <option value="Boni">Boni</option>
        <option value="Guadalupe">Guadalupe</option>
        <option value="Buendia">Buendia</option>
        <option value="Ayala">Ayala</option>
        <option value="Magallanes">Magallanes</option>
        <option value="Taft Avenue">Taft Avenue</option>
    </select>
    <label for="discount">Passenger Type</label>
    <select id="discount">
        <option value="0">Regular</option>
        <option value="20">Student</option>
        <option value="20">Senior Citizen</option>
        <option value="20">PWD</option>
    </select><br><br>
<input type="button" onclick="compute_fare()" value="Compute Fare">
    </form>
    <div id="output"></div>
    </div><br>
    <footer class="footer">
        <p> Hermione Therese Paredes, and Andrea C. Zagala | 9 - Topaz &copy; 2026.</p>
    </footer>
    <script src="proj.js"></script>
</body>
</html>
