<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style2.css">
    <title>Mionea Express Fare Matrix</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="matrix.html">Fare Matrix</a>
            <a href="https://www.quartertotwelve.com/time/manila-ph/" target="_blank"">Schedule</a>
            <input type="text" class="search" placeholder="Search...">
            <button class="search-btn" style="color: rgb(190, 140, 240); font-weight: bold;" onclick="location.reload()">Search</button>
            <a href="#" class="right">Book Now</a>
            <button type="submit" class="create-btn"><a href="#registration.html">Create my account</button>
        </nav>
    </header>
    <div class="fare-container">
    <form>
    <label for="locations">MRT Line 3 (North Avenue – Taft Avenue)</label>
    <select name="locations" id="locations">
    <option value="North Avenue">North Avenue</option>
    <option value="Quezon Avenue">Quezon Avenue</option>
    <option value="Kamuning">Kamuning</option>
    <option value="Araneta Center-Cubao">Araneta Center-Cubao</option>
    <option value="Santolan-Annapolis">Santolan-Annapolis</option>
    <option value="Ortigas">Ortigas</option>
    <option value="Shaw Boulevard">Shaw Boulevard</option>
    <option value="Boni">Boni</option>
    <option value="Guadalupe">Guadalupe</option>
    <option value="Buendia">Buendia</option>
    <option value="Ayala">Ayala</option>
    <option value="Magallanes">Magallanes</option>
    <option value="Taft Avenue">Taft Avenue"</option>
    </select>
        <input type="number" id="base" placeholder="base fare (Php)" min="0" max="100"><br>
        <input type="number" id="discount" placeholder="discount %" min="0" max="100"><br>
        <input type="button" onclick="compute_fare()" value="Compute">
    </form>
    <div id="output"></div>
    </div>

    <footer class="footer">
        <p> Hermione Therese Paredes, and Andrea C. Zagala | 9 - Topaz &copy; 2026.</p>
    </footer>

    <script src="proj.js"></script>
</body>
</html>
