<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {      
            background-image: url(https://art.ngfiles.com/images/6977000/6977632_2351606_blazedmissile_untitled-6977632.010cb9d4b1ac03571b1d994a706b6d53.webp?f1756022885);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;   
        }
        input {
            padding: 10px 80px; 
            border: none; 
            border-radius: 5px; 
            text-align: center;
        }
        p {
            color:rgb(0, 255, 255);
        }
        label {
            color:rgb(0, 255, 255);
            text-align: left;
        }
        .main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            min-height: 100vh;
        }
        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="matrix.html">Fare Matrix</a>
        <a href="https://www.quartertotwelve.com/time/manila-ph/" target="_blank">Schedule</a>
        <input type="text" class="search" placeholder="Search...">
        <button class="search-btn" style="color: rgb(190, 140, 240); font-weight: bold;" onclick="location.reload()">Search</button>
        <a href="registration.html" class="right">Book Now</a>
        <button type="submit" class="create-btn"><a href="registration.html">Create my account</a></button>
    </nav>
    <div class="main-wrapper">
        <div style="text-align: center; background-color: rgba(100, 177, 222, 0.8); padding: 20px; border-radius: 50px; max-width: 300px;">
            <img src="https://png.pngtree.com/png-vector/20210228/ourmid/pngtree-white-circle-background-png-image_2975665.jpg">
            <form>
                <br><input type="file" style="text-align: center; background-color: rgb(22, 123, 186); color: rgb(255, 255, 255); padding: 10px 10px; border: none; border-radius: 5px;">
            </form>
        </div>
    <div>
        <div style="text-align: left; background-color: rgba(190, 140, 240, 0.8); padding: 20px; border-radius: 50px; max-width: 400px;">
            <h1><b>REGISTRATION</b></h1>
            <p>Please fill out all required fields in the registration form with accurate information. Once completed, review your details and click Submit to finish your registration.</p>
            <form>
                <label>First Name</label><br>
                <input id="value" type="text" placeholder="Input your First Name"><br><br>
                <label>Last Name</label><br>
                <input id="value" type="text" placeholder="Input your Last Name"><br><br>
                <label>Age</label><br>
                <input id="value" type="number" placeholder="Input your Age"><br><br>
                <label>Email</label><br>
                <input id="value" type="text" placeholder="Input your Email">
            </form>
            <label>
                <br><input type="checkbox"> I accept the <a href="https://policies.google.com/terms?hl=en-US">Terms of Use and Privacy Policy</a>
            </label><br><br>
        </div>
        <script src="proj.js"></script>
    </div>
    <footer class="footer">
        <p> Hermione Therese Paredes, and Andrea C. Zagala | 9 - Topaz &copy; 2026.</p>
    </footer>

</html>
